<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=index.html">
    <meta name="robots" content="noindex, follow">
    <title>الصفحة غير موجودة | مكتب تأشيرات السعودية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light-color);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .error-container {
            max-width: 600px;
            width: 100%;
            background: var(--white);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            border-top: 5px solid var(--accent-color);
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .back-home-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--accent-color);
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        .back-home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
            background-color: var(--accent-hover);
        }
        @media (max-width: 768px) {
            .error-code { font-size: 80px; }
            .error-title { font-size: 1.5rem; }
            .error-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">عذراً، الصفحة غير موجودة</h1>
        <p class="error-message">
            يبدو أنك سلكت طريقاً خاطئاً، أو أن الصفحة التي تبحث عنها قد تم نقلها أو حذفها. 
            لا تقلق، سيتم تحويلك تلقائياً إلى الصفحة الرئيسية خلال 3 ثوانٍ...
        </p>
        <a href="index.html" class="back-home-btn">العودة للصفحة الرئيسية</a>
    </div>

</body>
</html>
